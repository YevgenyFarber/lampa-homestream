server:
  host: "0.0.0.0"
  port: 9090

# Add your SMB shares here
shares:
  - name: "Movies"
    type: "movies"                              # "movies" or "tv"
    smb_url: "smb://YOUR_NAS_IP/share/Movies"   # SMB path to your media folder
    username: "your_username"
    password: "your_password"

  - name: "TV Shows"
    type: "tv"
    smb_url: "smb://YOUR_NAS_IP/share/TV"
    username: "your_username"
    password: "your_password"

tmdb:
  api_key: "YOUR_TMDB_API_KEY"   # Get free key at https://www.themoviedb.org/settings/api
  language: "en"                  # "en", "ru", etc.

scanner:
  extensions:
    - ".mkv"
    - ".mp4"
    - ".avi"
    - ".m4v"
    - ".ts"
    - ".m2ts"
  exclude_patterns:
    - "**/sample/**"
    - "**/extras/**"
    - "**/.recycle/**"
  scan_interval_hours: 6

data_dir: "/data"
